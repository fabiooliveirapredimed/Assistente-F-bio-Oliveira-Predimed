<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Predimed IA" />
  <title>Assistente IA · Fábio Oliveira</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root{--gold:#C9A84C;--gold2:#E8C96A;--gold3:#a07830;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;--card:#161616;--border:rgba(201,168,76,0.15);--text:#F0EBE0;--muted:#6B5D45;--muted2:#8a7a62;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    body{background:var(--dark);font-family:'DM Sans',sans-serif;overflow:hidden;}
    ::-webkit-scrollbar{width:2px;}
    ::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px;}
    input,textarea,button{font-family:'DM Sans',sans-serif;}
    input::placeholder,textarea::placeholder{color:var(--muted);}
    @keyframes pulse{0%,100%{opacity:0.2}50%{opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .gold-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0A0A0A;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;padding:11px 20px;}
    .gold-btn:disabled{background:#222;color:var(--muted);cursor:not-allowed;}
    .gold-btn:active{transform:scale(0.97);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
    .inp{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border 0.2s;}
    .inp:focus{border-color:var(--gold);}
    .bu{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0A0A0A;border-radius:18px 18px 4px 18px;padding:11px 15px;font-size:13px;}
    .ba{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px 18px 18px 18px;padding:11px 15px;font-size:13px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;
const ZONAS={"Portimão":{t1:"160-220k",t2:"220-320k",t3:"280-450k",arrT2:"1.100-1.600"},"Ferragudo":{t1:"180-260k",t2:"280-400k",t3:"350-600k",arrT2:"1.300-1.900"},"Carvoeiro":{t1:"200-300k",t2:"300-500k",t3:"400-700k",arrT2:"1.400-2.200"},"Albufeira":{t1:"170-280k",t2:"250-450k",t3:"320-600k",arrT2:"1.200-2.000"},"Lagos":{t1:"190-280k",t2:"280-450k",t3:"350-650k",arrT2:"1.300-2.000"}};
const DOCS={comprador:["Cartão de Cidadão / BI","NIF português","Comprovativo de morada","Declaração de IRS (2 anos)","Extratos bancários (3 meses)","Declaração de vínculo laboral","Aprovação bancária (se crédito)"],vendedor:["Caderneta predial atualizada","Certidão de registo predial","Licença de habitabilidade","Certificado energético (obrigatório)","Última declaração de IMI","Documentação de condomínio","Declaração de não dívidas"],escritura:["CPCV assinado","IMT e Imposto de Selo pagos","Procuração (se representado)","Ficha técnica de habitação","Declaração conformidade obras"]};
const SCRIPTS={qualificacao:`SCRIPTconst SYSBASE=`És o assistente pessoal do Fábio Oliveira, consultor imobiliário sénior da Predimed Portimão (AMI 22503). Av. Tomás Cabreira, Ed. Casa da Praia, Loja 10, 8500-802 Portimão. Tel: 916 190 158 | fabio.oliveira@predimed.pt\n\nMERCADO ALGARVE 2025:\n- Portimão: T1 160-220k€, T2 220-320k€, T3 280-450k€\n- Ferragudo: T1 180-260k€, T2 280-400k€, T3 350-600k€\n- Carvoeiro: T1 200-300k€, T2 300-500k€, T3 400-700k€\n- Albufeira: T1 170-280k€, T2 250-450k€, T3 320-600k€\n- Lagos: T1 190-280k€, T2 280-450k€, T3 350-650k€\n\nIMPOSTOS: IMT isento até 97.064€, depois escalonado até 8%. Imposto de Selo: 0,8%. Notário+Registo: ~2.000€.\nCOMISSÃO: 5% + IVA (23%) sobre valor de venda.\n\nResponde SEMPRE em português de Portugal. Dás respostas concretas com números reais.`;
const SYSTEMS={chat:SYSBASE,email:SYSBASE+"\n\nRediges emails profissionais. Formato: ASSUNTO: [assunto]\n\n[corpo]. Assina: Fábio Oliveira | Consultor Imobiliário | Predimed Portimão | 916 190 158 | fabio.oliveira@predimed.pt",analytics:SYSBASE+"\n\nAnalisas mercado imobiliário, ROI e tendências do Algarve. Dás números concretos e recomendações práticas.",tools:SYSBASE+"\n\nEspecialista em processos e documentação imobiliária em Portugal. Conheces CPCV, escrituras, financiamento e legislação."};
async function claude(messages,tab){try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:SYSTEMS[tab]||SYSTEMS.chat,messages})});const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"Erro.";}catch{return"Erro de ligação. Tenta novamente.";}}
function CalcPanel(){const[v,setV]=useState("");const[res,setRes]=useState(null);const[cv,setCv]=useState("");const[cr,setCr]=useState(null);const fmt=n=>n?.toLocaleString("pt-PT",{style:"currency",currency:"EUR"});const calcIMT=()=>{const n=parseFloat(v.replace(/\s/g,"").replace(",","."));if(isNaN(n)||n<=0)return;let imt=0;if(n<=97064)imt=0;else if(n<=132774)imt=n*0.02-1941.28;else if(n<=181034)imt=n*0.05-5924.50;else if(n<=301688)imt=n*0.07-9526.18;else if(n<=578598)imt=n*0.08-12543.06;else if(n<=1000000)imt=n*0.06;else imt=n*0.075;const is=n*0.008;setRes({n,imt,is,total:imt+is+2000});};const calcC=()=>{const n=parseFloat(cv.replace(/\s/g,"").replace(",","."));if(isNaN(n)||n<=0)return;const base=n*0.05;const iva=base*0.23;setCr({n,base,iva,total:base+iva,liq:base*0.7});};
return(<div style={{display:"flex",flexDirection:"column",gap:16,overflowY:"auto",height:"100%"}}><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>🏛️ IMT + Impostos de Compra</p><input className="inp" value={v} onChange={e=>setV(e.target.value)} placeholder="Valor do imóvel (ex: 280000)" style={{marginBottom:10}}/><button className="gold-btn" onClick={calcIMT} style={{width:"100%",padding:12}}>Calcular Custos</button>{res&&<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:6}}>{[["Valor do Imóvel",fmt(res.n)],["IMT",res.imt===0?"ISENTO ✓":fmt(res.imt)],["Imposto de Selo (0,8%)",fmt(res.is)],["Notário + Registo","~2.000 €"]].map(([l,val])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><span style={{color:"var(--muted2)",fontSize:13}}>{l}</span><span style={{color:val==="ISENTO ✓"?"#38a169":"var(--text)",fontSize:13,fontWeight:600}}>{val}</span></div>))}<div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"rgba(201,168,76,0.1)",borderRadius:8,border:"1px solid var(--border)",marginTop:4}}><span style={{color:"var(--gold)",fontSize:14,fontWeight:700}}>TOTAL CUSTOS</span><span style={{color:"var(--gold)",fontSize:14,fontWeight:700}}>{fmt(res.total)}</span></div></div>}</div><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>💰 Calculadora de Comissão (5%+IVA)</p><input className="inp" value={cv} onChange={e=>setCv(e.target.value)} placeholder="Valor de venda (ex: 350000)" style={{marginBottom:10}}/><button className="gold-btn" onClick={calcC} style={{width:"100%",padding:12}}>Calcular Comissão</button>{cr&&<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:6}}>{[["Comissão base (5%)",fmt(cr.base)],["IVA (23%)",fmt(cr.iva)],["Total faturado",fmt(cr.total)]].map(([l,val])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><span style={{color:"var(--muted2)",fontSize:13}}>{l}</span><span style={{color:"var(--text)",fontSize:13,fontWeight:600}}>{val}</span></div>))}<div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"rgba(201,168,76,0.1)",borderRadius:8,border:"1px solid var(--border)",marginTop:4}}><span style={{color:"var(--gold)",fontSize:14,fontWeight:700}}>Recebo (~70%)</span><span style={{color:"var(--gold)",fontSize:14,fontWeight:700}}>{fmt(cr.liq)}</span></div></div>}</div><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>📍 Preços de Mercado — Algarve 2025</p>{Object.entries(ZONAS).map(([zona,p])=>(<div key={zona} style={{padding:"10px 14px",background:"var(--dark3)",borderRadius:10,border:"1px solid var(--border)",marginBottom:8}}><p style={{color:"var(--gold)",fontSize:12,fontWeight:700,marginBottom:6}}>{zona}</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}><span style={{color:"var(--muted2)",fontSize:11}}>T1: <b style={{color:"var(--text)"}}>{p.t1}€</b></span><span style={{color:"var(--muted2)",fontSize:11}}>T2: <b style={{color:"var(--text)"}}>{p.t2}€</b></span><span style={{color:"var(--muted2)",fontSize:11}}>T3: <b style={{color:"var(--text)"}}>{p.t3}€</b></span><span style={{color:"var(--muted2)",fontSize:11}}>Arr T2: <b style={{color:"var(--text)"}}>{p.arrT2}€</b></span></div></div>))}</div></div>);}
function ScriptsPanel(){const[as,setAs]=useState(null);const[ad,setAd]=useState(null);const[q,setQ]=useState("");const[ans,setAns]=useState("");const[loading,setLoading]=useState(false);const ask=async(query)=>{const qq=query||q;if(!qq.trim())return;setLoading(true);setAns("");const r=await claude([{role:"user",content:qq}],"tools");setAns(r);setLoading(false);};
return(<div style={{display:"flex",flexDirection:"column",gap:14,overflowY:"auto",height:"100%"}}><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>🎯 Scripts de Venda</p>{[{k:"qualificacao",l:"Qualificação de Cliente"},{k:"objecao",l:"Objeção de Preço"},{k:"followup",l:"Follow-up Pós-Visita"}].map(s=>(<div key={s.k} style={{marginBottom:8}}><button onClick={()=>setAs(as===s.k?null:s.k)} style={{width:"100%",padding:"12px 16px",background:as===s.k?"rgba(201,168,76,0.15)":"var(--dark3)",border:`1px solid ${as===s.k?"var(--gold)":"var(--border)"}`,borderRadius:as===s.k?"10px 10px 0 0":10,color:as===s.k?"var(--gold)":"var(--text)",fontSize:13,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between"}}>{s.l}<span>{as===s.k?"▲":"▼"}</span></button>{as===s.k&&<div style={{padding:14,background:"var(--dark3)",borderRadius:"0 0 10px 10px",border:"1px solid var(--border)",borderTop:"none"}}><pre style={{color:"var(--text)",fontSize:12,lineHeight:1.75,whiteSpace:"pre-wrap",fontFamily:"DM Sans"}}>{SCRIPTS[s.k]}</pre></div>}</div>))}</div><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>📋 Documentos Necessários</p>{[{k:"comprador",l:"📥 Comprador"},{k:"vendedor",l:"📤 Vendedor"},{k:"escritura",l:"✍️ Escritura"}].map(d=>(<div key={d.k} style={{marginBottom:8}}><button onClick={()=>setAd(ad===d.k?null:d.k)} style={{width:"100%",padding:"12px 16px",background:ad===d.k?"rgba(201,168,76,0.15)":"var(--dark3)",border:`1px solid ${ad===d.k?"var(--gold)":"var(--border)"}`,borderRadius:ad===d.k?"10px 10px 0 0":10,color:ad===d.k?"var(--gold)":"var(--text)",fontSize:13,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between"}}>{d.l}<span>{ad===d.k?"▲":"▼"}</span></button>{ad===d.k&&<div style={{padding:14,background:"var(--dark3)",borderRadius:"0 0 10px 10px",border:"1px solid var(--border)",borderTop:"none"}}>{DOCS[d.k].map((doc,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<DOCS[d.k].length-1?"1px solid rgba(255,255,255,0.04)":"none"}}><span style={{color:"var(--gold)",fontSize:12}}>◆</span><span style={{color:"var(--text)",fontSize:12}}>{doc}</span></div>))}</div>}</div>))}</div><div className="card"><p style={{color:"var(--gold)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,fontWeight:700}}>🤖 Perguntas sobre Processos</p><div style={{display:"flex",gap:8,marginBottom:10}}><input className="inp" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask()} placeholder="Ex: Como funciona o CPCV?"/><button className="gold-btn" onClick={()=>ask()} disabled={loading} style={{padding:"11px 16px",borderRadius:10,whiteSpace:"nowrap"}}>{loading?"...":"→"}</button></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["Como funciona o CPCV?","Prazo para escritura?","O que é o Golden Visa?"].map(qq=>(<button key={qq} onClick={()=>{setQ(qq);ask(qq);}} style={{padding:"5px 12px",borderRadius:20,background:"rgba(201,168,76,0.08)",border:"1px solid var(--border)",color:"var(--gold)",fontSize:11,cursor:"pointer"}}>{qq}</button>))}</div>{(loading||ans)&&<div style={{marginTop:12,padding:14,background:"var(--dark3)",borderRadius:10,border:"1px solid var(--border)"}}>{loading?<p style={{color:"var(--gold)",fontSize:13}}>A consultar...</p>:<p style={{color:"var(--text)",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{ans}</p>}</div>}</div></div>);}
function TasksPanel(){const[tasks,setTasks]=useState([{id:1,text:"Visita Penthouse T4 Portimão — João Santos 15h",p:"alta",done:false},{id:2,text:"Follow-up Casa Geminada T3 Ferragudo",p:"alta",done:false},{id:3,text:"Publicar T1 Portimão no portal Predimed",p:"média",done:false},{id:4,text:"Enviar documentação escritura",p:"baixa",done:true}]);const[inp,setInp]=useState("");const[pr,setPr]=useState("média");const[ai,setAi]=useState("");const[loading,setLoading]=useState(false);const pc=p=>({alta:"#e53e3e",média:"var(--gold)",baixa:"#38a169"}[p]);const add=()=>{if(!inp.trim())return;setTasks(t=>[...t,{id:Date.now(),text:inp,p:pr,done:false}]);setInp("");};
return(<div style={{display:"flex",flexDirection:"column",gap:14,height:"100%"}}><div className="card"><p style={{color:"var(--muted2)",fontSize:11,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Nova Tarefa</p><input className="inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Ex: Visita T2 Ferragudo 15h — cliente Maria" style={{marginBottom:10}}/><div style={{display:"flex",gap:8}}>{["alta","média","baixa"].map(p=>(<button key={p} onClick={()=>setPr(p)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${pc(p)}`,background:pr===p?pc(p)+"33":"transparent",color:pc(p),fontSize:12,cursor:"pointer",fontWeight:pr===p?700:400}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>))}<button className="gold-btn" onClick={add} style={{flex:2,padding:"8px 0"}}>+ Adicionar</button></div></div><div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>{tasks.map(tk=>(<div key={tk.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"var(--card)",borderRadius:10,border:"1px solid var(--border)",opacity:tk.done?0.4:1}}><div onClick={()=>setTasks(t=>t.map(x=>x.id===tk.id?{...x,done:!x.done}:x))} style={{width:18,height:18,borderRadius:5,border:`2px solid ${pc(tk.p)}`,background:tk.done?pc(tk.p):"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{tk.done&&<span style={{color:"#0A0A0A",fontSize:11,fontWeight:900}}>✓</span>}</div><span style={{flex:1,color:"var(--text)",fontSize:13,textDecoration:tk.done?"line-through":"none"}}>{tk.text}</span><span style={{fontSize:10,color:pc(tk.p),background:pc(tk.p)+"22",padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{tk.p}</span><button onClick={()=>setTasks(t=>t.filter(x=>x.id!==tk.id))} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>))}</div>{ai&&<div style={{padding:14,background:"var(--dark3)",borderRadius:12,border:"1px solid var(--border)"}}><p style={{color:"var(--gold)",fontSize:11,marginBottom:8,textTransform:"uppercase"}}>💡 Sugestão IA</p><p style={{color:"var(--text)",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{ai}</p></div>}<button className="gold-btn" disabled={loading} onClick={async()=>{setLoading(true);const list=tasks.filter(t=>!t.done).map(t=>`[${t.p}] ${t.text}`).join("\n");const r=await claude([{role:"user",content:`Organiza estas tarefas e dá sugestões práticas:\n${list}`}],"tasks");setAi(r);setLoading(false);}} style={{padding:13,borderRadius:12}}>{loading?"A organizar...":"✨ IA: Otimizar o meu dia"}</button></div>);}
function ChatPanel({tab}){const[msgs,setMsgs]=useState([]);const[inp,setInp]=useState("");const[loading,setLoading]=useState(false);const ref=useRef(null);useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);const QUICK={chat:["Como qualificar um cliente comprador?","Estratégia para fechar mais rápido","Como responder a objeção de preço?"],email:["Proposta comercial a vendedor","Follow-up após visita ao imóvel","Apresentação a cliente internacional"],analytics:["Tendências mercado Algarve 2025","ROI T2 Portimão para arrendamento","Como posicionar preço T3 Ferragudo?"]};const send=async(text)=>{const msg=text||inp;if(!msg.trim())return;const nm=[...msgs,{role:"user",content:msg}];setMsgs(nm);setInp("");setLoading(true);const r=await claude(nm,tab);setMsgs(m=>[...m,{role:"assistant",content:r}]);setLoading(false);};const fmt=(text)=>{if(tab!=="email")return<p style={{margin:0,whiteSpace:"pre-wrap",lineHeight:1.7,fontSize:13}}>{text}</p>;const lines=text.split("\n");const sub=lines.find(l=>l.startsWith("ASSUNTO:"));const body=lines.filter(l=>!l.startsWith("ASSUNTO:")).join("\n").trim();return<div>{sub&&<div style={{background:"rgba(201,168,76,0.15)",borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:11,color:"var(--gold)",fontWeight:700,borderLeft:"3px solid var(--gold)"}}>{sub}</div>}<p style={{margin:0,whiteSpace:"pre-wrap",lineHeight:1.7,fontSize:13}}>{body}</p></div>;};
return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>{msgs.length===0&&<div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:16,padding:"0 10px"}}><p style={{color:"var(--muted)",fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Sugestões rápidas</p><div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>{(QUICK[tab]||QUICK.chat).map(q=><button key={q} onClick={()=>send(q)} style={{padding:"9px 16px",borderRadius:22,background:"rgba(201,168,76,0.08)",border:"1px solid var(--border)",color:"var(--gold)",fontSize:12,cursor:"pointer"}}>{q}</button>)}</div></div>}{msgs.length>0&&<div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:8}}>{msgs.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>{m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold),var(--gold2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🏠</div>}<div className={m.role==="user"?"bu":"ba"}>{fmt(m.content)}</div></div>))}{loading&&<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,var(--gold),var(--gold2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🏠</div><div className="ba"><span style={{color:"var(--muted)",fontSize:13}}>A processar</span><span style={{animation:"pulse 1.2s infinite",color:"var(--gold)"}}>...</span></div></div>}<div ref={ref}/></div>}<div style={{display:"flex",gap:8,paddingTop:12,borderTop:"1px solid var(--border)",marginTop:8}}><input className="inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={tab==="email"?"Descreve o email que precisas...":"Pergunta o que precisares..."} style={{borderRadius:12}}/><button className="gold-btn" onClick={()=>send()} disabled={loading||!inp.trim()} style={{padding:"11px 16px",borderRadius:12}}>→</button></div></div>);}
const TABS=[{id:"chat",label:"Assistente",icon:"🏠"},{id:"email",label:"E-mails",icon:"✉️"},{id:"tasks",label:"Tarefas",icon:"✅"},{id:"analytics",label:"Mercado",icon:"📊"},{id:"calc",label:"Impostos",icon:"🏛️"},{id:"scripts",label:"Scripts",icon:"🎯"}];
function App(){const[tab,setTab]=useState("chat");const[time,setTime]=useState(new Date());useEffect(()=>{const t=setInterval(()=>setTime(new Date()),60000);return()=>clearInterval(t);},[]);const h=time.getHours();const g=h<12?"Bom dia":h<19?"Boa tarde":"Boa noite";
return(<div style={{height:"100vh",background:"var(--dark)",display:"flex",flexDirection:"column"}}><div style={{padding:"13px 18px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--dark2)",flexShrink:0}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:36,height:36,borderRadius:9,background:"linear-gradient(135deg,var(--gold),var(--gold2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🏡</div><div><p style={{color:"var(--text)",fontWeight:700,fontSize:15,fontFamily:"'Playfair Display',serif"}}>Fábio Oliveira</p><p style={{color:"var(--gold)",fontSize:9,letterSpacing:1.5,textTransform:"uppercase"}}>Predimed Portimão · Consultor</p></div></div><div style={{textAlign:"right"}}><p style={{color:"var(--gold)",fontSize:12,fontWeight:600}}>{g} 👋</p><p style={{color:"var(--muted)",fontSize:10}}>{time.toLocaleDateString("pt-PT",{weekday:"short",day:"numeric",month:"short"})}</p></div></div><div style={{display:"flex",borderBottom:"1px solid var(--border)",background:"var(--dark2)",flexShrink:0,overflowX:"auto"}}>{TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 13px",border:"none",background:"none",cursor:"pointer",color:tab===t.id?"var(--gold)":"var(--muted)",borderBottom:tab===t.id?"2px solid var(--gold)":"2px solid transparent",fontSize:11,fontWeight:tab===t.id?700:400,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",transition:"all 0.2s"}}><span>{t.icon}</span>{t.label}</button>))}</div><div style={{flex:1,padding:"16px 18px",overflow:"hidden",display:"flex",flexDirection:"column",animation:"fadeUp 0.25s ease"}} key={tab}>{tab==="tasks"?<TasksPanel/>:tab==="calc"?<CalcPanel/>:tab==="scripts"?<ScriptsPanel/>:<ChatPanel tab={tab}/>}</div><div style={{padding:"6px 18px",borderTop:"1px solid var(--border)",background:"var(--dark2)",flexShrink:0}}><p style={{color:"var(--muted)",fontSize:9,letterSpacing:0.8,textTransform:"uppercase"}}>Predimed Imobiliária · AMI 22503 · Portimão · 916 190 158</p></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
