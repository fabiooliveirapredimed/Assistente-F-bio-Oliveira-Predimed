<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Predimed IA" />
  <title>Assistente IA · Fábio Oliveira</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #C9A84C44; border-radius: 3px; }
    input::placeholder { color: #7A6A50; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const GOLD="#C9A84C",GOLD2="#E8C96A",DARK="#0D0D0D",DARK2="#141414",DARK3="#1C1C1C",CARD="#181818",BORDER="rgba(201,168,76,0.18)",TEXT="#F5F0E8",MUTED="#7A6A50";
    const TABS=[{id:"chat",label:"Assistente",icon:"🏠"},{id:"email",label:"E-mails",icon:"✉️"},{id:"tasks",label:"Tarefas",icon:"✅"},{id:"analytics",label:"Negócio",icon:"📊"}];
    const SYSTEM={chat:`És o assistente pessoal do Fábio Oliveira, consultor imobiliário da Predimed Portimão (AMI 22503). Especializado no mercado do Algarve. Contacto: 916 190 158 | fabio.oliveira@predimed.pt. Responde sempre em português de Portugal.`,email:`Representas o Fábio Oliveira, Predimed Portimão. Rediges emails profissionais em português. Formato: ASSUNTO: [assunto]\n\n[corpo]. Assina: Fábio Oliveira | Predimed Portimão | 916 190 158`,tasks:`Gestor de produtividade do Fábio Oliveira, consultor imobiliário. Ajudas com visitas, follow-ups e prospeção. Respondes em português.`,analytics:`Analista de negócio do Fábio Oliveira, Predimed Portimão. Analisas o mercado do Algarve e dás insights. Respondes em português.`};
    const QUICK={chat:["Como qualificar
                       async function callClaude(messages,tab){const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM[tab],messages})});const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"Erro.";}
    function GoldBtn({children,onClick,disabled,style={}}){return <button onClick={onClick} disabled={disabled} style={{background:disabled?"#2a2a2a":`linear-gradient(135deg,${GOLD},${GOLD2})`,border:"none",borderRadius:10,color:disabled?MUTED:DARK,fontWeight:700,fontSize:14,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",padding:"11px 22px",...style}}>{children}</button>;}
    function TaskManager(){const[tasks,setTasks]=useState([{id:1,text:"Visita ao Penthouse T4 em Portimão",priority:"alta",done:false},{id:2,text:"Follow-up — Casa Geminada T3 em Ferragudo",priority:"alta",done:false},{id:3,text:"Publicar novo T1 em Portimão",priority:"média",done:false},{id:4,text:"Enviar documentação escritura",priority:"baixa",done:true}]);const[input,setInput]=useState("");const[priority,setPriority]=useState("média");const[aiMsg,setAiMsg]=useState("");const[loading,setLoading]=useState(false);const addTask=()=>{if(!input.trim())return;setTasks(t=>[...t,{id:Date.now(),text:input,priority,done:false}]);setInput("");};const toggle=id=>setTasks(t=>t.map(tk=>tk.id===id?{...tk,done:!tk.done}:tk));const remove=id=>setTasks(t=>t.filter(tk=>tk.id!==id));const pc=p=>({alta:"#e53e3e",média:GOLD,baixa:"#38a169"}[p]);const aiOrganize=async()=>{setLoading(true);const list=tasks.map(t=>`- [${t.priority}] ${t.text}`).join("\n");const reply=await callClaude([{role:"user",content:`Tarefas:\n${list}\n\nAjuda-me a priorizar.`}],"tasks");setAiMsg(reply);setLoading(false);};
    return(<div style={{display:"flex",flexDirection:"column",gap:14,height:"100%"}}><div style={{background:CARD,borderRadius:14,padding:18,border:`1px solid ${BORDER}`}}><p style={{color:MUTED,fontSize:12,marginBottom:10,textTransform:"uppercase",letterSpacing:1,fontFamily:"DM Sans"}}>Nova Tarefa</p><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Ex: Visita ao T2 em Ferragudo às 15h..." style={{width:"100%",background:DARK3,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 14px",color:TEXT,fontSize:14,marginBottom:10,outline:"none"}}/><div style={{display:"flex",gap:8}}>{["alta","média","baixa"].map(p=>(<button key={p} onClick={()=>setPriority(p)} style={{flex:1,padding:"7px 0",borderRadius:7,border:`1px solid ${pc(p)}`,background:priority===p?pc(p)+"33":"transparent",color:pc(p),fontSize:12,cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>))}<GoldBtn onClick={addTask} style={{flex:2,padding:"7px 0"}}>+ Adicionar</GoldBtn></div></div><div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>{tasks.map(tk=>(<div key={tk.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:CARD,borderRadius:10,border:`1px solid ${BORDER}`,opacity:tk.done?0.45:1}}><div onClick={()=>toggle(tk.id)} style={{width:18,height:18,borderRadius:5,border:`2px solid ${pc(tk.priority)}`,background:tk.done?pc(tk.priority):"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{tk.done&&<span style={{color:DARK,fontSize:11,fontWeight:900}}>✓</span>}</div><span style={{flex:1,color:TEXT,fontSize:13,textDecoration:tk.done?"line-through":"none"}}>{tk.text}</span><span style={{fontSize:11,color:pc(tk.priority),background:pc(tk.priority)+"22",padding:"2px 9px",borderRadius:20}}>{tk.priority}</span><button onClick={()=>remove(tk.id)} style={{background:"none",border:"none",color:MUTED,cursor:"pointer",fontSize:18}}>×</button></div>))}</div>{aiMsg&&<div style={{background:DARK3,borderRadius:12,padding:16,border:`1px solid ${BORDER}`}}><p style={{color:GOLD,fontSize:12,marginBottom:8}}>💡 Sugestão IA</p><p style={{color:TEXT,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{aiMsg}</p></div>}<GoldBtn onClick={aiOrganize} disabled={loading} style={{width:"100%",padding:13}}>{loading?"A organizar...":"✨ IA: Otimizar o meu dia"}</GoldBtn></div>);}
    function Analytics(){const[question,setQuestion]=useState("");const[answer,setAnswer]=useState("");const[loading,setLoading]=useState(false);const metrics=[{label:"Imóveis em Carteira",value:"15",delta:"↑ activos"},{label:"Zona Principal",value:"Portimão",delta:"Algarve"},{label:"Gama de Preços",value:"185K–1,2M€",delta:"compra"},{label:"Arrendamentos",value:"1.300–1.950€",delta:"mensais"}];const ask=async(q)=>{const query=q||question;if(!query.trim())return;setLoading(true);setAnswer("");const reply=await callClaude([{role:"user",content:query}],"analytics");setAnswer(reply);setLoading(false);};return(<div style={{display:"flex",flexDirection:"column",gap:18,overflowY:"auto"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{metrics.map(m=>(<div key={m.label} style={{background:CARD,borderRadius:12,padding:18,border:`1px solid ${BORDER}`}}><p style={{color:MUTED,fontSize:11,marginBottom:6,textTransform:"uppercase"}}>{m.label}</p><p style={{color:TEXT,fontSize:20,fontWeight:700,marginBottom:4}}>{m.value}</p><span style={{color:GOLD,fontSize:12}}>{m.delta}</span></div>))}</div><div style={{background:CARD,borderRadius:12,padding:18,border:`1px solid ${BORDER}`}}><p style={{color:MUTED,fontSize:11,marginBottom:12,textTransform:"uppercase"}}>Analista IA</p><div style={{display:"flex",gap:8,marginBottom:10}}><input value={question} onChange={e=>setQuestion(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask()} placeholder="Ex: Preço médio T2 em Portimão?" style={{flex:1,background:DARK3,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 14px",color:TEXT,fontSize:13,outline:"none"}}/><GoldBtn onClick={()=>ask()} disabled={loading}>{loading?"...":"Analisar"}</GoldBtn></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{QUICK.analytics.map(q=>(<button key={q} onClick={()=>{setQuestion(q);ask(q);}} style={{padding:"5px 12px",borderRadius:20,background:GOLD+"15",border:`1px solid ${BORDER}`,color:GOLD,fontSize:12,cursor:"pointer"}}>{q}</button>))}</div></div>{(loading||answer)&&<div style={{background:DARK3,borderRadius:12,padding:20,border:`1px solid ${BORDER}`}}>{loading?<p style={{color:GOLD}}>A analisar...</p>:<p style={{color:TEXT,fontSize:13,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{answer}</p>}</div>}</div>);}
    function ChatPanel({tab}){const[messages,setMessages]=useState([]);const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const bottomRef=useRef(null);useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);const send=async(text)=>{const msg=text||input;if(!msg.trim())return;const newMessages=[...messages,{role:"user",content:msg}];setMessages(newMessages);setInput("");setLoading(true);try{const reply=await callClaude(newMessages,tab);setMessages(m=>[...m,{role:"assistant",content:reply}]);}catch{setMessages(m=>[...m,{role:"assistant",content:"Erro. Tenta novamente."}]);}setLoading(false);};const formatMsg=(text)=>{if(tab!=="email")return <p style={{margin:0,whiteSpace:"pre-wrap",lineHeight:1.65}}>{text}</p>;const lines=text.split("\n");const sub=lines.find(l=>l.startsWith("ASSUNTO:"));const body=lines.filter(l=>!l.startsWith("ASSUNTO:")).join("\n").trim();return <div>{sub&&<div style={{background:GOLD+"22",borderRadius:6,padding:"6px 10px",marginBottom:10,fontSize:12,color:GOLD,fontWeight:600,borderLeft:`3px solid ${GOLD}`}}>{sub}</div>}<p style={{margin:0,whiteSpace:"pre-wrap",lineHeight:1.65}}>{body}</p></div>;};
    return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>{messages.length===0&&(<div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:18}}><p style={{color:MUTED,fontSize:13}}>Sugestões rápidas:</p><div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",maxWidth:500}}>{QUICK[tab].map(q=>(<button key={q} onClick={()=>send(q)} style={{padding:"10px 18px",borderRadius:24,background:GOLD+"12",border:`1px solid ${BORDER}`,color:GOLD,fontSize:13,cursor:"pointer"}}>{q}</button>))}</div></div>)}{messages.length>0&&(<div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:14,paddingBottom:8}}>{messages.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>{m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,marginRight:8,flexShrink:0,marginTop:2}}>🏠</div>}<div style={{maxWidth:"76%",padding:"12px 16px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"4px 18px 18px 18px",background:m.role==="user"?`linear-gradient(135deg,${GOLD},${GOLD2})`:CARD,border:m.role==="user"?"none":`1px solid ${BORDER}`,color:m.role==="user"?DARK:TEXT,fontSize:13}}>{formatMsg(m.content)}</div></div>))}{loading&&<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,display:"flex",alignItems:"center",justifyContent:"center"}}>🏠</div><div style={{padding:"12px 18px",borderRadius:"4px 18px 18px 18px",background:CARD,border:`1px solid ${BORDER}`}}><span style={{color:MUTED,fontSize:13}}>A processar</span><span style={{animation:"pulse 1.2s infinite",color:GOLD}}>...</span></div></div>}<div ref={bottomRef}/></div>)}<div style={{display:"flex",gap:10,paddingTop:12,borderTop:`1px solid ${BORDER}`,marginTop:8}}><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={tab==="email"?"Descreve o email que precisas...":"Pergunta o que precisares..."} style={{flex:1,background:DARK3,border:`1px solid ${BORDER}`,borderRadius:12,padding:"12px 16px",color:TEXT,fontSize:13,outline:"none"}}/><GoldBtn onClick={()=>send()} disabled={loading||!input.trim()} style={{padding:"12px 18px",borderRadius:12}}>→</GoldBtn></div></div>);}
    function App(){const[activeTab,setActiveTab]=useState("chat");const[time,setTime]=useState(new Date());useEffect(()=>{const t=setInterval(()=>setTime(new Date()),60000);return()=>clearInterval(t);},[]);const hour=time.getHours();const greeting=hour<12?"Bom dia":hour<19?"Boa tarde":"Boa noite";
    return(<div style={{minHeight:"100vh",height:"100vh",background:DARK,fontFamily:"'Cormorant Garamond',Georgia,serif",display:"flex",flexDirection:"column"}}><div style={{padding:"16px 20px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:DARK2,flexShrink:0}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏡</div><div><p style={{color:TEXT,fontWeight:700,fontSize:16}}>Fábio Oliveira</p><p style={{color:GOLD,fontSize:10,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"DM Sans"}}>Predimed Portimão · Consultor</p></div></div><div style={{textAlign:"right",fontFamily:"DM Sans"}}><p style={{color:GOLD,fontSize:12,fontWeight:500}}>{greeting} 👋</p><p style={{color:MUTED,fontSize:10}}>{time.toLocaleDateString("pt-PT",{weekday:"short",day:"numeric",month:"short"})}</p></div></div>
    <div style={{display:"flex",borderBottom:`1px solid ${BORDER}`,background:DARK2,flexShrink:0,overflowX:"auto"}}>{TABS.map(tab=>(<button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{padding:"12px 16px",border:"none",background:"none",cursor:"pointer",color:activeTab===tab.id?GOLD:MUTED,borderBottom:activeTab===tab.id?`2px solid ${GOLD}`:"2px solid transparent",fontSize:12,fontFamily:"DM Sans",fontWeight:activeTab===tab.id?600:400,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}><span>{tab.icon}</span>{tab.label}</button>))}</div>
    <div style={{flex:1,padding:"18px 20px",overflow:"hidden",display:"flex",flexDirection:"column",animation:"fadeUp 0.3s ease"}}>{activeTab==="tasks"?<TaskManager/>:activeTab==="analytics"?<Analytics/>:<ChatPanel key={activeTab} tab={activeTab}/>}</div>
    <div style={{padding:"8px 20px",borderTop:`1px solid ${BORDER}`,flexShrink:0}}><span style={{color:MUTED,fontSize:9,fontFamily:"DM Sans",letterSpacing:0.5}}>PREDIMED IMOBILIÁRIA · AMI Nº 22503 · PORTIMÃO</span></div></div>);}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
